<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Stellar Drift</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        /* 100vh se queda corto/salta en Safari/Chrome móvil cuando la
           barra de direcciones aparece o desaparece; 100dvh (con fallback
           a 100vh en navegadores viejos) sigue el viewport real. */
        height: 100vh;
        height: 100dvh;
        background: #02030a;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        font-family: system-ui, sans-serif;
      }
      #app {
        width: 100%;
        height: 100%;
        /* Deja el juego dentro del área segura (notch, home indicator,
           cámaras perforadas) cuando corre en pantalla completa. */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
